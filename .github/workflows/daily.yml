name: daily-picks

on:
  schedule:
    # 週一到週五 16:00 Asia/Taipei = 08:00 UTC (週一到週五)
    # 0 = Sunday, 1 = Monday, ..., 6 = Saturday
    # UTC 08:00 對應台北時間 16:00，週末不執行
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許推送到 gh-pages 分支

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Verify package versions
        run: |
          echo "### Python Package Versions" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pip list | grep -E "(pandas|yfinance|matplotlib)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "import pandas as pd; import yfinance as yf; import matplotlib; print(f'pandas: {pd.__version__}'); print(f'yfinance: {yf.__version__}'); print(f'matplotlib: {matplotlib.__version__}')"

      - name: Install Chinese fonts for matplotlib
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei
          fc-cache -fv
          echo "Installed fonts:"
          fc-list | grep -i "WenQuanYi" || echo "No WenQuanYi fonts found"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      # === Google Drive (OAuth) 設定 ===
      # 需要事先在 Repository secrets 放入：
      # - GDRIVE_CLIENT_ID
      # - GDRIVE_CLIENT_SECRET
      # - GDRIVE_TOKEN_JSON   (含 refresh_token 的整段 JSON)
      # 可選：
      # - GDRIVE_ROOT_FOLDER_ID  指定同步的目標資料夾 ID（建議）
      - name: Configure rclone (Google Drive OAuth)
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID || secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -e
          mkdir -p ~/.config/rclone

          # 檢查必要的環境變數
          if [ -z "${GDRIVE_CLIENT_ID}" ] || [ -z "${GDRIVE_CLIENT_SECRET}" ] || [ -z "${GDRIVE_TOKEN_JSON}" ]; then
            echo "::error::缺少必要的 Google Drive 認證資訊"
            echo "請確認以下 Secrets 已設定："
            echo "- GDRIVE_CLIENT_ID"
            echo "- GDRIVE_CLIENT_SECRET"
            echo "- GDRIVE_TOKEN_JSON"
            exit 1
          fi

          # 建立 rclone 配置檔
          {
            echo "[gdrive]"
            echo "type = drive"
            echo "scope = drive"
            echo "client_id = ${GDRIVE_CLIENT_ID}"
            echo "client_secret = ${GDRIVE_CLIENT_SECRET}"
            echo "token = ${GDRIVE_TOKEN_JSON}"
          } > ~/.config/rclone/rclone.conf

          # 如果有設定 root_folder_id，追加到設定檔
          if [ -n "${GDRIVE_ROOT_FOLDER_ID}" ]; then
            echo "root_folder_id = ${GDRIVE_ROOT_FOLDER_ID}" >> ~/.config/rclone/rclone.conf
            echo "✓ root_folder_id 已設定 (限制存取範圍到指定資料夾)" >> $GITHUB_STEP_SUMMARY
            echo "  Folder ID: ${GDRIVE_ROOT_FOLDER_ID:0:20}..." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ root_folder_id 未設定 (可存取整個 Google Drive)" >> $GITHUB_STEP_SUMMARY
            echo "  建議設定 GDRIVE_ROOT_FOLDER_ID 或 GDRIVE_FOLDER_ID Secret" >> $GITHUB_STEP_SUMMARY
          fi

          # 顯示配置檔案（隱藏敏感資訊）
          echo "### rclone remote configured" >> $GITHUB_STEP_SUMMARY
          echo "Config preview (secrets hidden):" >> $GITHUB_STEP_SUMMARY
          grep -v "client_id\|client_secret\|token" ~/.config/rclone/rclone.conf >> $GITHUB_STEP_SUMMARY || true

          # 診斷資訊
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Diagnostic Info" >> $GITHUB_STEP_SUMMARY
          echo "- Config file exists: $(test -f ~/.config/rclone/rclone.conf && echo 'YES' || echo 'NO')" >> $GITHUB_STEP_SUMMARY
          echo "- Config file size: $(wc -c < ~/.config/rclone/rclone.conf) bytes" >> $GITHUB_STEP_SUMMARY
          echo "- Number of lines: $(wc -l < ~/.config/rclone/rclone.conf)" >> $GITHUB_STEP_SUMMARY
          echo "- CLIENT_ID length: ${#GDRIVE_CLIENT_ID}" >> $GITHUB_STEP_SUMMARY
          echo "- CLIENT_SECRET length: ${#GDRIVE_CLIENT_SECRET}" >> $GITHUB_STEP_SUMMARY
          echo "- TOKEN_JSON length: ${#GDRIVE_TOKEN_JSON}" >> $GITHUB_STEP_SUMMARY
          echo "- TOKEN starts with: ${GDRIVE_TOKEN_JSON:0:20}..." >> $GITHUB_STEP_SUMMARY

      # 測試 rclone 配置是否正常
      - name: Test rclone connection
        timeout-minutes: 2
        run: |
          echo "Testing rclone connection to Google Drive..."

          # 顯示配置檔的實際內容結構（不顯示完整值）
          echo "### Config File Structure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          sed 's/client_id = .*/client_id = [HIDDEN]/; s/client_secret = .*/client_secret = [HIDDEN]/; s/token = .*/token = [HIDDEN - length: '$(grep "^token = " ~/.config/rclone/rclone.conf | wc -c)' chars]/' ~/.config/rclone/rclone.conf >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # 測試連接並捕獲錯誤
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Connection Test Result" >> $GITHUB_STEP_SUMMARY
          if rclone about gdrive: --timeout 30s --contimeout 30s 2>&1 | tee /tmp/rclone_test.log; then
            echo "✅ Connection successful!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Connection failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/rclone_test.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No error log available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::rclone connection test failed, but continuing anyway"
          fi

      # 先把雲端資料同步到本地
      # 如果有設定 root_folder_id，只會同步該資料夾的內容
      - name: Sync data from Google Drive
        timeout-minutes: 5
        run: |
          mkdir -p data
          echo "開始從 Google Drive 同步資料..."
          echo "目標: gdrive: (根目錄或 root_folder_id 指定的資料夾)"
          echo "本地: ./data 和 ./taiex.sqlite"

          # 下載 taiex.sqlite 到根目錄
          if rclone ls "gdrive:" | grep -q "taiex.sqlite"; then
            echo "發現 taiex.sqlite，下載中..."
            rclone copy "gdrive:taiex.sqlite" "./" -vv --timeout 30s || echo "taiex.sqlite 下載失敗"
          else
            echo "⚠️  Google Drive 中未找到 taiex.sqlite (首次執行會自動建立)"
          fi

          # 同步 data 資料夾 (日期子資料夾)
          # 使用 copy 而非 sync，避免刪除本地靜態設定檔（theme_keywords.yaml 等）
          rclone copy "gdrive:data" "./data" \
            -vv \
            --log-file rclone.log \
            --timeout 30s \
            --contimeout 60s \
            --retries 3 \
            --low-level-retries 3 \
            --create-empty-src-dirs || true

          # 下載 line_id.txt 到根目錄
          if rclone ls "gdrive:" | grep -q "line_id.txt"; then
            echo "發現 line_id.txt，下載中..."
            rclone copy "gdrive:line_id.txt" "./" -vv --timeout 30s || echo "line_id.txt 下載失敗"
          else
            echo "⚠️  Google Drive 中未找到 line_id.txt"
          fi

      # 執行你的主程式（會讀寫 ./data）
      - name: Run Taiwan stock recommendation bot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          # 可選參數（如有需要就在 Secrets 或 Variables 設定）
          # EXTRA_USER_IDS: ${{ secrets.EXTRA_USER_IDS }}
          # TWSE_CODES: "2330,2317,2303,2454,2603,2615,2881,2882,2886,1101"
          # TOP_K: "10"
        run: python main.py

      # 從 gh-pages 拉取舊的 HTML 檔案，讓 index.html 可以列出所有歷史資料
      - name: Fetch historical HTML files from gh-pages
        continue-on-error: true
        run: |
          echo "從 gh-pages 分支拉取歷史 HTML 檔案..."

          # 配置 git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 清理 rclone.log 避免分支切換衝突
          rm -f rclone.log

          # 暫存本地變更（避免切換分支時衝突）
          git stash push -m "Stash before switching to gh-pages" || echo "無需 stash"

          # 拉取 gh-pages 分支
          git fetch origin gh-pages:gh-pages 2>/dev/null || {
            echo "gh-pages 分支不存在（可能是首次執行）"
            exit 0
          }

          # 切換到 gh-pages 分支
          git checkout gh-pages

          # 複製所有 HTML 檔案（排除 index.html）和 images 資料夾到暫存目錄
          mkdir -p /tmp/old_pages
          cp -r *.html /tmp/old_pages/ 2>/dev/null || echo "無 HTML 檔案"
          cp -r images /tmp/old_pages/ 2>/dev/null || echo "無 images 資料夾"

          # 切回主分支
          git checkout main

          # 先備份今天新生成的檔案
          mkdir -p /tmp/new_pages
          cp -r docs/* /tmp/new_pages/ 2>/dev/null || echo "無新檔案需備份"

          # 將 gh-pages 的所有檔案複製到 docs（先建立完整的歷史資料）
          mkdir -p docs/images
          cp -r /tmp/old_pages/*.html docs/ 2>/dev/null || echo "無舊 HTML 檔案"

          # 複製 images 資料夾
          if [ -d "/tmp/old_pages/images" ]; then
            cp -r /tmp/old_pages/images/* docs/images/ 2>/dev/null || echo "無舊圖片"
          fi

          # 再將今天新生成的檔案覆蓋回去（確保今天的資料是最新的）
          cp -rf /tmp/new_pages/* docs/ 2>/dev/null || echo "無新檔案需要覆蓋"

          echo "歷史檔案合併完成，現在 docs 資料夾內容："
          ls -la docs/ | head -20
          echo ""
          echo "HTML 檔案列表:"
          ls -1 docs/*.html 2>/dev/null || echo "無 HTML 檔案"

          # 重新生成 index.html，讓它包含所有歷史資料
          python -c "
          import sys
          sys.path.insert(0, '.')
          from modules.html_generator import generate_index_html
          generate_index_html(output_dir='docs')
          print('index.html 已更新，包含所有歷史資料')
          "

      # 將更新後的資料回寫到雲端
      # 如果有設定 root_folder_id，只會上傳到該資料夾
      - name: Sync data back to Google Drive
        timeout-minutes: 5
        continue-on-error: true
        run: |
          echo "開始上傳資料到 Google Drive..."

          # 上傳 taiex.sqlite 到根目錄
          if [ -f "./taiex.sqlite" ]; then
            echo "上傳 taiex.sqlite 到根目錄..."
            rclone copy "./taiex.sqlite" "gdrive:" \
              -vv \
              --log-file rclone.log \
              --timeout 30s \
              --contimeout 60s \
              --retries 3 \
              --update \
              --checksum || echo "::warning::taiex.sqlite 上傳失敗"
          else
            echo "⚠️  找不到 taiex.sqlite"
          fi

          # 上傳 data 資料夾 (日期子資料夾)
          if [ -d "./data" ] && [ -n "$(ls -A ./data)" ]; then
            echo "上傳 data 資料夾..."
            echo "檔案數量: $(find ./data -type f | wc -l)"
            rclone copy "./data" "gdrive:data" \
              -vv \
              --log-file rclone.log \
              --timeout 30s \
              --contimeout 60s \
              --retries 3 \
              --low-level-retries 3 \
              --update \
              --checksum || echo "::warning::data 資料夾上傳失敗"
          else
            echo "⚠️  data 資料夾為空或不存在"
          fi

      # 失敗或成功都上傳 rclone 日誌，方便除錯
      - name: Upload rclone logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rclone-logs
          path: rclone.log

      # 清理不該部署的檔案（在部署前執行）
      - name: Prepare docs directory for deployment
        run: |
          echo "準備部署資料夾..."

          # 移除資料庫檔案（不應該部署到 GitHub Pages）
          if [ -f "docs/taiex.sqlite" ]; then
            echo "⚠️  發現 taiex.sqlite，移除中..."
            rm -f docs/taiex.sqlite
          fi

          # 移除 .gitignore 等不需要的檔案
          rm -f docs/.gitignore docs/.DS_Store

          echo "檢查 docs 資料夾內容:"
          ls -la docs/ || echo "docs 資料夾為空"

          if [ -d "docs/images" ]; then
            echo "圖片資料夾內容:"
            ls -la docs/images/ | head -20
          fi

      # 部署到 GitHub Pages（使用 keep_files 保留舊檔案）
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true  # 保留舊檔案，新檔案會覆蓋同名檔案

      # 清理 gh-pages 分支中超過 7 天的舊資料
      - name: Clean old data in gh-pages (keep last 7 days)
        continue-on-error: true
        run: |
          # 配置 git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 清理 rclone.log 避免分支切換衝突
          rm -f rclone.log

          # 暫存本地變更（避免切換分支時衝突）
          git stash push -m "Stash before switching to gh-pages for cleanup" || echo "無需 stash"

          # 確保有最新的 main 分支代碼
          git fetch origin main

          # 切換到 gh-pages 分支並拉取最新變更（包含剛剛部署的新檔案）
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages

          # 移除不該存在的資料庫檔案（如果存在）
          if [ -f "taiex.sqlite" ]; then
            echo "⚠️  發現 taiex.sqlite 在 gh-pages 分支中，移除中..."
            rm -f taiex.sqlite
            git add taiex.sqlite
            git commit -m "🧹 移除錯誤上傳的 taiex.sqlite 資料庫檔案" || echo "已經移除"
          fi

          # 清理根目錄中的舊 HTML 檔案（舊結構遺留）
          echo "清理根目錄中的舊 HTML 檔案..."
          OLD_HTML_FILES=$(find . -maxdepth 1 -name "20*.html" -type f)
          if [ -n "$OLD_HTML_FILES" ]; then
            echo "發現根目錄中的舊 HTML 檔案，準備移除："
            echo "$OLD_HTML_FILES"
            rm -f 20*.html
            git add -A
            git commit -m "🧹 清理根目錄中的舊 HTML 檔案（已遷移至 docs/ 資料夾）" || echo "無需提交"
            echo "✅ 已清理根目錄中的舊 HTML 檔案"
          else
            echo "✅ 根目錄中沒有舊 HTML 檔案需要清理"
          fi

          # 清理根目錄中的舊圖片資料夾（舊結構遺留）
          if [ -d "images" ]; then
            echo "發現根目錄中的舊 images 資料夾，準備移除..."
            # 只移除日期格式的資料夾（避免誤刪）
            find images -maxdepth 1 -type d -name "20*" -exec rm -rf {} + 2>/dev/null || true
            # 如果 images 資料夾為空，也移除
            if [ -z "$(ls -A images 2>/dev/null)" ]; then
              rm -rf images
              git add -A
              git commit -m "🧹 清理根目錄中的舊 images 資料夾（已遷移至 docs/images/）" || echo "無需提交"
              echo "✅ 已清理根目錄中的舊 images 資料夾"
            fi
          fi

          # 從最新的 main 分支複製獨立的 index 生成腳本
          git checkout origin/main -- generate_index_standalone.py

          # 顯示複製的腳本版本（除錯用）
          echo "檢查 generate_index_standalone.py 是否包含星期幾邏輯:"
          grep -A 2 "weekday" generate_index_standalone.py | head -5 || echo "⚠️ 未找到 weekday 相關代碼"

          # 執行歸檔腳本（將超過 7 天的檔案移到 archive 資料夾）
          python - <<EOF
          import os
          from datetime import datetime
          import shutil

          # 設定保留天數（與 index.html 使用相同參數）
          KEEP_DAYS = 7

          # 取得所有 HTML 檔案（從 docs/ 資料夾掃描，排除 index.html）
          docs_dir = 'docs'
          if not os.path.exists(docs_dir):
              print(f"⚠️  {docs_dir} 資料夾不存在")
              exit(0)

          html_files = [f for f in os.listdir(docs_dir)
                        if f.endswith('.html') and f != 'index.html']

          # 解析日期並排序
          dates = []
          for f in html_files:
              try:
                  date_str = f.replace('.html', '')
                  date = datetime.strptime(date_str, '%Y-%m-%d')
                  dates.append((date, date_str))
              except ValueError:
                  print(f"無法解析日期: {f}")

          dates.sort(reverse=True)  # 最新的在前

          # 保留最近 KEEP_DAYS 天，將其他的移到歸檔資料夾
          files_archived = False
          if len(dates) > KEEP_DAYS:
              print(f"發現 {len(dates)} 天的資料，保留最近 {KEEP_DAYS} 天，歸檔其他資料")

              # 建立歸檔資料夾
              os.makedirs('archive', exist_ok=True)
              os.makedirs('archive/images', exist_ok=True)

              for date, date_str in dates[KEEP_DAYS:]:
                  # 移動 HTML 檔案到歸檔資料夾（從 docs/ 移到 archive/）
                  html_file = os.path.join(docs_dir, f"{date_str}.html")
                  if os.path.exists(html_file):
                      os.makedirs('archive', exist_ok=True)
                      archive_path = os.path.join('archive', f"{date_str}.html")
                      shutil.move(html_file, archive_path)
                      print(f"已歸檔: {html_file} -> {archive_path}")
                      files_archived = True

                  # 移動對應的圖片資料夾到歸檔（從 docs/images/ 移到 archive/images/）
                  images_dir = os.path.join(docs_dir, "images", date_str)
                  if os.path.exists(images_dir):
                      os.makedirs(os.path.join('archive', 'images'), exist_ok=True)
                      archive_images_path = os.path.join('archive', 'images', date_str)
                      shutil.move(images_dir, archive_images_path)
                      print(f"已歸檔: {images_dir} -> {archive_images_path}")
                      files_archived = True

              # 寫入標記檔案，告訴後續步驟是否需要 commit
              with open('/tmp/files_archived.txt', 'w') as f:
                  f.write('true' if files_archived else 'false')

              print(f"\n✅ 歸檔完成！主頁保留 {KEEP_DAYS} 天，舊資料已移至 archive/ 資料夾")
          else:
              print(f"目前有 {len(dates)} 天的資料（≤{KEEP_DAYS} 天），無需歸檔")
              with open('/tmp/files_archived.txt', 'w') as f:
                  f.write('false')
          EOF

          # 重新生成主頁 index.html（包含所有保留的日期）
          echo "重新生成主頁 index.html..."

          # 先顯示生成前的狀態
          echo "生成前 index.html 包含的日期:"
          grep -oP '"\d{4}-\d{2}-\d{2}\.html"' index.html 2>/dev/null | sort -r | head -20 || echo "index.html 不存在或無法解析"

          # 刪除舊的 index.html，強制重新生成
          rm -f index.html

          # 重新生成主頁
          python generate_index_standalone.py || {
            echo "::error::生成 index.html 失敗"
            exit 1
          }

          # 如果 archive 資料夾存在，生成 archive/index.html
          if [ -d "archive" ]; then
            echo "生成歸檔索引頁 archive/index.html..."
            python - <<'ARCHIVE_EOF'
          import os
          from datetime import datetime

          # 掃描 archive 資料夾中的所有 HTML 檔案
          archive_dir = 'archive'
          if not os.path.exists(archive_dir):
              exit(0)

          html_files = [f for f in os.listdir(archive_dir)
                        if f.endswith('.html') and f != 'index.html']
          dates = sorted([f.replace('.html', '') for f in html_files], reverse=True)

          print(f"找到 {len(dates)} 個歸檔日期")

          # 生成日期項目
          date_items_html = []
          for date in dates:
              try:
                  weekday = datetime.strptime(date, '%Y-%m-%d').strftime('%A')
                  weekday_zh = {
                      'Monday': '週一', 'Tuesday': '週二', 'Wednesday': '週三',
                      'Thursday': '週四', 'Friday': '週五', 'Saturday': '週六', 'Sunday': '週日'
                  }[weekday]

                  date_items_html.append(f'''
                      <a href="{date}.html" class="date-item">
                          <div class="date-item-date">📅 {date} ({weekday_zh})</div>
                          <div class="date-item-arrow">→</div>
                      </a>
                  ''')
              except ValueError:
                  print(f"無法解析日期: {date}")

          date_items_html = '\n'.join(date_items_html)

          # 生成 archive/index.html
          html_content = f'''<!DOCTYPE html>
          <html lang="zh-TW">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>歷史歸檔 - 台股推薦機器人</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      padding: 20px;
                  }}
                  .container {{
                      max-width: 900px;
                      margin: 0 auto;
                      background: white;
                      border-radius: 20px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      overflow: hidden;
                  }}
                  .header {{
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      padding: 60px 30px;
                      text-align: center;
                  }}
                  .header h1 {{ font-size: 3em; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }}
                  .header p {{ font-size: 1.2em; opacity: 0.95; }}
                  .content {{ padding: 40px 30px; }}
                  .intro {{ text-align: center; margin-bottom: 40px; color: #666; }}
                  .intro h2 {{ color: #667eea; margin-bottom: 15px; }}
                  .date-list {{ display: grid; gap: 15px; }}
                  .date-item {{
                      display: block;
                      padding: 25px 30px;
                      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                      border-radius: 12px;
                      text-decoration: none;
                      color: #333;
                      transition: transform 0.2s, box-shadow 0.2s;
                      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                  }}
                  .date-item:hover {{ transform: translateX(10px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }}
                  .date-item-date {{ font-size: 1.5em; font-weight: bold; color: #667eea; margin-bottom: 5px; }}
                  .date-item-arrow {{ float: right; font-size: 1.5em; color: #667eea; }}
                  .footer {{ text-align: center; padding: 30px; background: #f5f7fa; color: #666; border-top: 1px solid #e0e0e0; }}
                  .btn {{
                      padding: 12px 30px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      text-decoration: none;
                      border-radius: 25px;
                      font-weight: bold;
                      transition: transform 0.2s;
                      display: inline-block;
                      margin: 20px 0;
                  }}
                  .btn:hover {{ transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }}
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>📁 歷史歸檔</h1>
                      <p>台股推薦機器人 - 歷史資料</p>
                  </div>
                  <div class="content">
                      <div class="intro">
                          <a href="../index.html" class="btn">← 回到主頁</a>
                          <h2>歷史推薦記錄</h2>
                          <p>這裡保存了所有超過 7 天的歷史推薦資料</p>
                      </div>
                      <div class="date-list">
          {date_items_html if date_items_html else '<div class="intro"><p>目前無歸檔資料</p></div>'}
                      </div>
                  </div>
                  <div class="footer">
                      <p>⚠️ 本資訊僅供學習研究使用，不構成任何投資建議</p>
                      <p>投資有風險，請謹慎評估</p>
                  </div>
              </div>
          </body>
          </html>
          '''

          index_file = os.path.join(archive_dir, 'index.html')
          with open(index_file, 'w', encoding='utf-8') as f:
              f.write(html_content)

          print(f"✅ archive/index.html 已生成，包含 {len(dates)} 個歷史日期")
          ARCHIVE_EOF
          fi

          # 顯示生成後的 index.html 內容（除錯用）
          echo ""
          echo "生成後 index.html 包含的日期:"
          grep -oP '"\d{4}-\d{2}-\d{2}\.html"' index.html | sort -r | head -20 || echo "無法解析日期"
          echo ""
          echo "檢查 index.html 格式（顯示前 3 個日期項目）:"
          grep -A 3 "date-item-date" index.html | head -12 || echo "無法找到日期項目"

          # 始終提交 index.html 的更新（確保包含最新部署的檔案）
          git add index.html

          # 檢查是否有任何變更需要提交
          if git diff --cached --quiet; then
            echo "⚠️  index.html 無變更，但仍然強制提交以確保同步"
            # 即使沒有變更，也使用 --allow-empty 提交
            git commit --allow-empty -m "📝 更新 index.html (確保同步)"
            git push origin gh-pages || {
              echo "::error::推送 index.html 失敗"
              exit 1
            }
          else
            # 如果有歸檔舊檔案，一併提交
            if [ -f "/tmp/files_archived.txt" ] && grep -q "true" /tmp/files_archived.txt; then
              echo "提交歸檔變更和更新的 index.html..."
              git add -A
              git commit -m "📦 將超過 7 天的資料歸檔至 archive/ 並更新 index.html"
            else
              echo "提交更新的 index.html..."
              git commit -m "📝 更新 index.html (包含所有歷史日期)"
            fi

            # 推送到 gh-pages
            echo "推送 index.html 到 gh-pages..."
            git push origin gh-pages || {
              echo "::error::推送 index.html 失敗"
              exit 1
            }
          fi

          # 切回主分支
          git checkout main
